<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>COSMART Training</title>
<link rel="icon" type="image/png" href="favicon-cosmart.png">
<style>
  :root{--az1:#0D2B6B;--az2:#1A4DAA;--az3:#3A8FC7;--ro1:#E02020;--sans:'Inter',Arial,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#060f22 0%,#0D2B6B 50%,#060f22 100%);font-family:var(--sans);padding:20px}
  .card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .logo-wrap{text-align:center;margin-bottom:32px}
  .logo-img{height:48px;width:auto}
  label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px}
  input{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:11px 14px;font-size:15px;
    outline:none;transition:border-color .2s;font-family:var(--sans)}
  input:focus{border-color:var(--az2)}
  .field{margin-bottom:18px}
  .btn{width:100%;background:var(--ro1);color:#fff;border:none;border-radius:8px;padding:14px;
    font-size:16px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:background .2s;margin-top:4px}
  .btn:hover{background:#c01010}
  .btn:disabled{background:#94a3b8;cursor:not-allowed}
  .error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:8px;
    padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
  .success{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;border-radius:8px;
    padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="Logo%20completo%20COSMART.png" alt="COSMART" class="logo-img">
  </div>
  <div class="error" id="errMsg"></div>
  <div class="success" id="okMsg"></div>
  <div class="field">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label for="pass">Contraseña</label>
    <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="loginBtn" onclick="login()">Ingresar</button>
</div>
<script>
const API = 'https://cosmart-training.conglomeradocosmart.workers.dev';
function showErr(msg){ const e=document.getElementById('errMsg'); e.textContent=msg; e.style.display='block'; document.getElementById('okMsg').style.display='none'; }
function showOk(msg){ const e=document.getElementById('okMsg'); e.textContent=msg; e.style.display='block'; document.getElementById('errMsg').style.display='none'; }
const token = localStorage.getItem('cv_token');
if(token) window.location.href = '/plataforma.html';
document.addEventListener('keydown', e => { if(e.key==='Enter') login(); });
async function login(){
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  if(!email||!pass){ showErr('Completá email y contraseña'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Ingresando...';
  try {
    const r = await fetch(`${API}/videos/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pass})
    });
    const d = await r.json();
    if(!r.ok){ showErr(d.error || 'Email o contraseña incorrectos'); return; }
    localStorage.setItem('cv_token', d.token);
    localStorage.setItem('cv_nombre', d.nombre);
    showOk('¡Bienvenida! Redirigiendo...');
    setTimeout(()=> window.location.href = '/plataforma.html', 800);
  } catch(e){ showErr('Error de conexión. Intentá de nuevo.'); }
  finally { btn.disabled=false; btn.textContent='Ingresar'; }
}
</script>
</body>
</html>

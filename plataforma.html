<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>COSMART Training</title>
<link rel="icon" type="image/png" href="favicon-cosmart.png">
<style>
  :root{--az1:#0D2B6B;--az2:#1A4DAA;--az3:#3A8FC7;--ro1:#E02020;--sans:'Inter',Arial,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:linear-gradient(135deg,#060f22 0%,#0D2B6B 60%,#060f22 100%);font-family:var(--sans);color:#fff}

  header{background:rgba(0,0,0,.3);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.1);
    padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo-img{height:36px;width:auto}
  .header-right{display:flex;align-items:center;gap:12px}
  .user-badge{background:rgba(255,255,255,.1);border-radius:20px;padding:6px 14px;font-size:13px;color:rgba(255,255,255,.8)}
  .logout-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;
    border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;font-family:var(--sans)}
  .logout-btn:hover{background:rgba(255,255,255,.2)}

  .progress-wrap{max-width:700px;margin:32px auto 24px;padding:0 24px}
  .progress-label{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.5);margin-bottom:8px}
  .progress-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--az3),var(--az2));border-radius:3px;transition:width .5s ease;width:0%}

  .videos-wrap{max-width:700px;margin:0 auto;padding:0 24px 60px}

  .video-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
    border-radius:16px;margin-bottom:20px;overflow:hidden;transition:border-color .2s}
  .video-card:hover{border-color:rgba(58,143,199,.4)}
  .video-card.completed{border-color:rgba(22,163,74,.3)}

  .video-header{padding:20px 24px;display:flex;align-items:center;gap:16px;cursor:pointer}
  .video-number{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--az2),var(--az3));
    display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0}
  .video-info{flex:1}
  .video-title{font-size:16px;font-weight:700;line-height:1.3}
  .video-status{font-size:12px;font-weight:600}
  .status-done{color:#4ade80}
  .status-pending{color:rgba(255,255,255,.4)}
  .toggle-icon{font-size:18px;transition:transform .3s;flex-shrink:0}
  .toggle-icon.open{transform:rotate(180deg)}

  .video-player-wrap{display:none;padding:0 24px 24px}
  .video-player-wrap.open{display:block}
  .video-container{background:#000;border-radius:12px;overflow:hidden;position:relative;padding-top:56.25%}
  .video-container video{position:absolute;top:0;left:0;width:100%;height:100%;outline:none}
  .loading-overlay{position:absolute;top:0;left:0;width:100%;height:100%;
    background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
  .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--az3);
    border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:13px;color:rgba(255,255,255,.5)}
  .mark-done-btn{display:block;width:100%;margin-top:14px;background:rgba(22,163,74,.15);
    border:1px solid rgba(22,163,74,.3);color:#4ade80;border-radius:8px;padding:11px;
    font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans)}
  .mark-done-btn:hover{background:rgba(22,163,74,.25)}
  .mark-done-btn.done{cursor:default}

  .completed-msg{text-align:center;padding:40px 24px;display:none}
  .completed-msg.show{display:block}
  .completed-icon{font-size:56px;margin-bottom:16px}
</style>
</head>
<body>

<header>
  <img src="Logo%20completo%20COSMART.png" alt="COSMART" class="logo-img">
  <div class="header-right">
    <span class="user-badge" id="userBadge"></span>
    <button class="logout-btn" onclick="logout()">Salir</button>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-label">
    <span>Tu progreso</span>
    <span id="progressText">0 de 3 completados</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="videos-wrap">

  <div class="video-card" id="card-1">
    <div class="video-header" onclick="toggleVideo(1)">
      <div class="video-number">01</div>
      <div class="video-info">
        <div class="video-title">Cómo enviar un email</div>
      </div>
      <div class="video-status status-pending" id="status-1">⏳ Pendiente</div>
      <div class="toggle-icon" id="toggle-1">▼</div>
    </div>
    <div class="video-player-wrap" id="player-1">
      <div class="video-container" id="container-1">
        <div class="loading-overlay" id="loading-1">
          <div class="spinner"></div>
          <div class="loading-text">Cargando video...</div>
        </div>
      </div>
      <button class="mark-done-btn" id="done-btn-1" onclick="markDone(1)">✓ Marcar como visto</button>
    </div>
  </div>

  <div class="video-card" id="card-2">
    <div class="video-header" onclick="toggleVideo(2)">
      <div class="video-number">02</div>
      <div class="video-info">
        <div class="video-title">Cómo crear automatizaciones para envío de secuencias de email marketing</div>
      </div>
      <div class="video-status status-pending" id="status-2">⏳ Pendiente</div>
      <div class="toggle-icon" id="toggle-2">▼</div>
    </div>
    <div class="video-player-wrap" id="player-2">
      <div class="video-container" id="container-2">
        <div class="loading-overlay" id="loading-2">
          <div class="spinner"></div>
          <div class="loading-text">Cargando video...</div>
        </div>
      </div>
      <button class="mark-done-btn" id="done-btn-2" onclick="markDone(2)">✓ Marcar como visto</button>
    </div>
  </div>

  <div class="video-card" id="card-3">
    <div class="video-header" onclick="toggleVideo(3)">
      <div class="video-number">03</div>
      <div class="video-info">
        <div class="video-title">Cómo revisar métricas</div>
      </div>
      <div class="video-status status-pending" id="status-3">⏳ Pendiente</div>
      <div class="toggle-icon" id="toggle-3">▼</div>
    </div>
    <div class="video-player-wrap" id="player-3">
      <div class="video-container" id="container-3">
        <div class="loading-overlay" id="loading-3">
          <div class="spinner"></div>
          <div class="loading-text">Cargando video...</div>
        </div>
      </div>
      <button class="mark-done-btn" id="done-btn-3" onclick="markDone(3)">✓ Marcar como visto</button>
    </div>
  </div>

  <div class="completed-msg" id="completedMsg">
    <div class="completed-icon">🎉</div>
    <h2>¡Completaste la capacitación!</h2>
  </div>
</div>

<script>
const API = 'https://cosmart-training.conglomeradocosmart.workers.dev';
const token = localStorage.getItem('cv_token');
const nombre = localStorage.getItem('cv_nombre') || '';
if(!token) window.location.href = '/login.html';
document.getElementById('userBadge').textContent = nombre.split(' ')[0] || '';

const BASE = 'https://pub-1d35491b9ebb4de4988fade35f459406.r2.dev';
const VIDEO_URLS = {
  1: BASE + '/Capacitaci%C3%B3n%20Mailchimp%20-%2001%20-%20C%C3%B3mo%20enviar%20un%20email.mp4',
  2: BASE + '/Capacitaci%C3%B3n%20Mailchimp%20-%2002%20-%20C%C3%B3mo%20crear%20automatizaciones%20para%20env%C3%ADo%20de%20secuencias%20de%20email%20marketing.mp4',
  3: BASE + '/Capacitaci%C3%B3n%20Mailchimp%20-%2003%20-%20C%C3%B3mo%20revisar%20m%C3%A9tricas.mp4'
};

let vistos = JSON.parse(localStorage.getItem('cv_vistos') || '[]');
let openVideo = null;

function initState(){ vistos.forEach(n => markDoneUI(n)); updateProgress(); }

function updateProgress(){
  const pct = Math.round((vistos.length / 3) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = vistos.length + ' de 3 completados';
  if(vistos.length === 3) document.getElementById('completedMsg').classList.add('show');
}

function markDoneUI(num){
  document.getElementById('status-' + num).textContent = 'Visto';
  document.getElementById('status-' + num).className = 'video-status status-done';
  document.getElementById('card-' + num).classList.add('completed');
  const btn = document.getElementById('done-btn-' + num);
  btn.textContent = 'Ya lo viste'; btn.classList.add('done'); btn.disabled = true;
}

async function toggleVideo(num){
  const player = document.getElementById('player-' + num);
  const toggleIcon = document.getElementById('toggle-' + num);
  if(openVideo && openVideo !== num){
    document.getElementById('player-' + openVideo).classList.remove('open');
    document.getElementById('toggle-' + openVideo).classList.remove('open');
    const prev = document.getElementById('video-el-' + openVideo);
    if(prev) prev.pause();
  }
  if(player.classList.contains('open')){
    player.classList.remove('open'); toggleIcon.classList.remove('open');
    const v = document.getElementById('video-el-' + num); if(v) v.pause();
    openVideo = null; return;
  }
  player.classList.add('open'); toggleIcon.classList.add('open'); openVideo = num;
  if(!document.getElementById('video-el-' + num)) loadVideo(num);
}

function loadVideo(num){
  const container = document.getElementById('container-' + num);
  const loading = document.getElementById('loading-' + num);
  const video = document.createElement('video');
  video.id = 'video-el-' + num;
  video.controls = true;
  video.preload = 'metadata';
  video.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:#000';
  video.src = VIDEO_URLS[num];
  video.addEventListener('loadedmetadata', function(){ loading.style.display = 'none'; });
  video.addEventListener('error', function(){ loading.innerHTML = '<div style="color:#f87171;padding:20px;text-align:center">Error al reproducir</div>'; });
  container.appendChild(video);
  loading.style.display = 'none';
}

function markDone(num){
  if(vistos.includes(num)) return;
  vistos.push(num); localStorage.setItem('cv_vistos', JSON.stringify(vistos));
  markDoneUI(num); updateProgress();
}

function logout(){
  localStorage.removeItem('cv_token'); localStorage.removeItem('cv_nombre');
  localStorage.removeItem('cv_vistos'); window.location.href = '/login.html';
}

initState();
</script>
</body>
</html>
